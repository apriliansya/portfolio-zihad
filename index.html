<!doctype html>
<html lang="en">
<head>

    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">

<body>

</video>

        <ul>

            <li data-aos="fade-up" data-aos-duration="1000" data-aos-delay="200"><a href="#">About</a></li>
            <li data-aos="fade-up" data-aos-duration="1000" data-aos-delay="300"><a href="#">Projects</a></li>

    <div class="hero">

            <div class="Buttons">

                <ul class="ul-icons">
                    <li><a href="#" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="1200"><i

                    <li><a href="#" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="1300"><i
                            class="bx bxl-twitter"></i></a></li>
                    <li><a href="#" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="1400"><i
                            class="bx bxl-youtube"></i></a></li>
                    <li><a href="#" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="1500"><i
                            class="bx bxl-facebook-circle"></i></a></li>
                </ul>
            </div>
        </div>

            <div class="hero-img" data-aos="zoom-in-left" data-aos-duration="2500">
                <img src="images/zihad.webp" alt="person-img">
            </div>
        </div>

        <div class="info-sec">
            <div class="info-card" data-aos="fade-in" data-aos-duration="1000" data-aos-delay="1600">
                <h1>4+</h1>
                <p>Year of <br> Experience</p>
            </div>
            <div class="info-card" data-aos="fade-in" data-aos-duration="1000" data-aos-delay="1700">
                <h1>7+</h1>
                <p>Technical <br> Skills</p>
            </div>
            <div class="info-card" data-aos="fade-in" data-aos-duration="1000" data-aos-delay="1800">

                <p>Projects <br> Completed</p>
            </div>
            <div class="info-card" data-aos="fade-in" data-aos-duration="1000" data-aos-delay="1900">

</section>
<script src="https://unpkg.com/aos@next/dist/aos.js"></script>

    AOS.init();
</script>
